<!DOCTYPE html>
<html>
<head>
  <title>AI Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Poppins, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f7fb;
      text-align: center;
    }

    .box {
      max-width: 500px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      background: #4f46e5;
    }

    .btn.secondary {
      background: #10b981;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>🌿 AI Tutor</h1>
    <p>Welcome! Learn, chat, and explore AI-powered tutoring.</p>

    <a class="btn" href="/login">Login</a>
    <a class="btn secondary" href="/register">Register</a>
  </div>

</body>
</html>
